name: CI Pipeline 

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v0

      - name: Setup Node.js
        uses: actions/setup-node@v0
        with:
          node-version: '16'

      - name: Build avec Docker
        run: docker-compose build
      - name: Lancer les tests
        run: docker-compose run app npm test