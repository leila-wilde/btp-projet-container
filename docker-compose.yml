version: '3.9'

services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: inframusic-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-inframusic_db}
      MYSQL_USER: ${DB_USER:-inframusic_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-inframusic_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-inframusic_user}", "-p${DB_PASSWORD:-inframusic_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Go-Fiber API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inframusic-api
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-inframusic_user}
      DB_PASSWORD: ${DB_PASSWORD:-inframusic_pass}
      DB_NAME: ${DB_NAME:-inframusic_db}
      API_PORT: ${API_PORT:-8080}
      ENV: ${ENV:-development}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # Adminer - Database Administration Tool
  adminer:
    image: adminer:latest
    container_name: inframusic-adminer
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      - db
    networks:
      - app-network
    environment:
      ADMINER_DEFAULT_SERVER: db
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
    driver: local
